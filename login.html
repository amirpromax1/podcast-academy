<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود</title>

<style>
body{
font-family:tahoma;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:90%;
max-width:500px;
padding:40px;
background:rgba(255,255,255,.05);
border-radius:20px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>
<body>

<div class="container">

<h1>ورود / ثبت نام</h1>

<input id="email" type="email" placeholder="ایمیل">

<input id="password" type="password" placeholder="رمز عبور">

<button onclick="signUp()">
ثبت نام
</button>

<button onclick="signIn()">
ورود
</button>

<p id="msg"></p>

</div>

<script>

const SUPABASE_URL =
"https://rkdjnkkdrhyzxzdlypff.supabase.co";

const SUPABASE_ANON_KEY =
"اینجا کلید anon خودت را قرار بده";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

async function signUp(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const { error } =
await supabaseClient.auth.signUp({
email,
password
});

document.getElementById("msg").innerText =
error ? error.message : "ثبت نام انجام شد";
}

async function signIn(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const { error } =
await supabaseClient.auth.signInWithPassword({
email,
password
});

if(error){
document.getElementById("msg").innerText =
error.message;
return;
}

window.location.href =
"dashboard.html";
}

</script>

</body>
</html>
