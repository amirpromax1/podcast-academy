<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>داشبورد | Podcast Academy</title>
  <style>
    /* reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      color: #fff;
      display: flex;
    }

    /* ===== منوی کناری (Sidebar) ===== */
    .sidebar {
      width: 260px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      padding: 30px 20px;
      height: 100vh;
      position: fixed;
      right: 0;
      top: 0;
      transform: translateX(100%);
      transition: 0.4s ease;
      box-shadow: -5px 0 30px rgba(0,0,0,0.5);
      z-index: 1000;
      overflow-y: auto;
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar .close-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      margin-bottom: 30px;
      display: block;
      width: 100%;
      text-align: left;
    }
    .sidebar .user-info {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 20px;
    }
    .sidebar .user-info .avatar {
      font-size: 60px;
      margin-bottom: 10px;
    }
    .sidebar .user-info .email {
      opacity: 0.8;
      font-size: 14px;
    }
    .sidebar .menu-item {
      display: block;
      padding: 14px 20px;
      margin: 8px 0;
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      transition: 0.3s;
      font-size: 16px;
      cursor: pointer;
      background: rgba(255,255,255,0.05);
    }
    .sidebar .menu-item:hover {
      background: #8b5cf6;
      transform: translateX(-5px);
    }
    .sidebar .menu-item.logout {
      background: #ef4444;
      margin-top: 40px;
      text-align: center;
    }
    .sidebar .menu-item.logout:hover {
      background: #dc2626;
    }

    /* ===== محتوای اصلی ===== */
    .main {
      flex: 1;
      padding: 30px 25px;
      margin-right: 0;
      transition: 0.3s;
      width: 100%;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: rgba(255,255,255,0.05);
      padding: 15px 25px;
      border-radius: 15px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: normal;
    }
    .header .hamburger {
      background: none;
      border: none;
      color: #fff;
      font-size: 30px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 5px;
    }
    .header .hamburger span {
      display: block;
      width: 30px;
      height: 3px;
      background: #fff;
      border-radius: 3px;
      transition: 0.3s;
    }
    .header .hamburger:hover span {
      background: #8b5cf6;
    }

    /* ===== کارت‌های پادکست ===== */
    .podcast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
      margin-top: 10px;
    }
    .podcast-card {
      background: rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .podcast-card:hover {
      transform: translateY(-8px);
      background: rgba(255,255,255,0.13);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }
    .podcast-card .cover {
      width: 100%;
      height: 140px;
      background: linear-gradient(45deg, #8b5cf6, #3b82f6);
      border-radius: 12px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .podcast-card h3 {
      font-size: 18px;
      margin-bottom: 6px;
    }
    .podcast-card p {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 15px;
    }
    .podcast-card .btn-start {
      background: #8b5cf6;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }
    .podcast-card .btn-start:hover {
      background: #7c3aed;
      transform: scale(1.02);
    }

    /* ===== وضعیت خالی ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.6;
    }
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    /* ===== پیام خطا ===== */
    #errorMsg {
      color: #f87171;
      background: rgba(239, 68, 68, 0.15);
      padding: 12px 18px;
      border-radius: 12px;
      margin: 20px 0;
      display: none;
      text-align: center;
    }

    /* ===== واکنش‌گرا ===== */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        transform: translateX(100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main {
        padding: 15px;
      }
      .header h1 {
        font-size: 20px;
      }
      .podcast-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 480px) {
      .podcast-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- ===== منوی کناری ===== -->
  <div class="sidebar" id="sidebar">
    <button class="close-btn" onclick="closeSidebar()">✕</button>
    <div class="user-info">
      <div class="avatar">👤</div>
      <div class="email" id="userEmail">---</div>
    </div>
    <a class="menu-item" href="dashboard.html">📊 داشبورد</a>
    <a class="menu-item" href="#profile">👤 پروفایل</a>
    <a class="menu-item" href="#history">📜 تاریخچه</a>
    <a class="menu-item logout" onclick="logoutUser()">🚪 خروج</a>
  </div>

  <!-- ===== محتوای اصلی ===== -->
  <div class="main">
    <div class="header">
      <h1>📚 داشبورد من</h1>
      <button class="hamburger" onclick="openSidebar()">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div id="errorMsg"></div>

    <div id="podcastContainer" class="podcast-grid">
      <!-- پادکست‌ها اینجا می‌آیند -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // ===== تنظیمات Supabase =====
    const SUPABASE_URL = "https://rkdjnkkdrhyzxzdlypff.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZGpua2tkcmh5enh6ZGx5cGZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjAxMDksImV4cCI6MjA5NzMzNjEwOX0.vadAJI4DhbAi5Y12gRd-OLVUYjvKa8R69PYvT68niyo";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ===== باز و بسته کردن منو =====
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
    }
    // کلیک بیرون منو برای بسته شدن (اختیاری)
    document.addEventListener('click', function(e) {
      const sidebar = document.getElementById('sidebar');
      const hamburger = document.querySelector('.hamburger');
      if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !hamburger.contains(e.target)) {
        closeSidebar();
      }
    });

    // ===== نمایش خطا =====
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.style.display = 'block';
      el.innerText = '⚠️ ' + msg;
    }
    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    // ===== ۱. بررسی وضعیت لاگین =====
    async function checkUser() {
      const { data, error } = await supabase.auth.getUser();
      if (error || !data.user) {
        // کاربر لاگین نیست → بفرست به صفحه ورود
        window.location.href = 'login.html';
        return null;
      }
      // نمایش ایمیل در منو
      document.getElementById('userEmail').innerText = data.user.email || 'کاربر';
      return data.user;
    }

    // ===== ۲. بارگذاری پادکست‌ها از جدول =====
    async function loadPodcasts() {
      const container = document.getElementById('podcastContainer');
      container.innerHTML = '<div style="text-align:center;padding:30px;">⏳ در حال بارگذاری...</div>';

      try {
        const { data, error } = await supabase
          .from('podcasts')
          .select('*');

        if (error) {
          console.error('❌ خطا در دریافت پادکست‌ها:', error);
          showError('خطا در دریافت پادکست‌ها: ' + error.message);
          container.innerHTML = '<div class="empty-state"><div class="icon">😵</div><p>خطا در ارتباط با دیتابیس</p></div>';
          return;
        }

        console.log('✅ پادکست‌های دریافت شده:', data); // لاگ برای دیباگ

        if (!data || data.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">📭</div>
              <p>هیچ پادکستی یافت نشد!</p>
              <p style="font-size:14px;">لطفاً از طریق SQL Editor یک پادکست نمونه اضافه کنید.</p>
            </div>
          `;
          return;
        }

        // ساخت کارت‌ها
        let html = '';
        data.forEach(pod => {
          html += `
            <div class="podcast-card">
              <div class="cover">🎙</div>
              <h3>${pod.title || 'بدون عنوان'}</h3>
              <p>${pod.description || ''}</p>
              <button class="btn-start" onclick="goToQuiz('${pod.id}')">شرکت در آزمون</button>
            </div>
          `;
        });
        container.innerHTML = html;
        hideError();

      } catch (err) {
        console.error('❌ خطای غیرمنتظره:', err);
        showError('خطا: ' + err.message);
        container.innerHTML = '<div class="empty-state"><div class="icon">💥</div><p>خطای غیرمنتظره!</p></div>';
      }
    }

    // ===== ۳. رفتن به صفحه آزمون =====
    function goToQuiz(podcastId) {
      if (!podcastId) {
        showError('شناسه پادکست نامعتبر است');
        return;
      }
      window.location.href = `quiz.html?podcastId=${podcastId}`;
    }

    // ===== ۴. خروج از حساب =====
    async function logoutUser() {
      try {
        const { error } = await supabase.auth.signOut();
        if (error) {
          showError('خطا در خروج: ' + error.message);
          return;
        }
        // بستن منو و رفتن به صفحه ورود
        closeSidebar();
        window.location.href = 'login.html';
      } catch (err) {
        showError('خطا: ' + err.message);
      }
    }

    // ===== اجرای اصلی =====
    (async function init() {
      const user = await checkUser();
      if (!user) return; // اگر لاگین نبود، به login می‌رود

      // حالا که کاربر لاگین است، پادکست‌ها را بارگذاری کن
      await loadPodcasts();
    })();
  </script>
</body>
</html>
