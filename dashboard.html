<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>داشبورد</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      color: #fff;
    }
    
    /* منو */
    .sidebar {
      position: fixed;
      top: 0;
      right: -300px;
      width: 280px;
      height: 100%;
      background: #0f172a;
      padding: 30px;
      transition: 0.3s;
      z-index: 999;
      border-left: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar.open {
      right: 0;
    }
    .sidebar .close-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      margin-bottom: 30px;
    }
    .sidebar .user-info {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar .user-info .avatar {
      font-size: 50px;
    }
    .sidebar .user-info .email {
      opacity: 0.7;
      font-size: 14px;
    }
    .sidebar .menu-item {
      display: block;
      padding: 12px 18px;
      margin: 8px 0;
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      transition: 0.3s;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
    }
    .sidebar .menu-item:hover {
      background: #8b5cf6;
    }
    .sidebar .menu-item.logout {
      background: #ef4444;
      margin-top: 40px;
      text-align: center;
    }
    .sidebar .menu-item.logout:hover {
      background: #dc2626;
    }
    
    /* محتوای اصلی */
    .main {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 24px;
    }
    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
    }
    .hamburger span {
      display: block;
      width: 28px;
      height: 3px;
      background: #fff;
      margin: 5px 0;
      border-radius: 3px;
      transition: 0.3s;
    }
    .hamburger:hover span {
      background: #8b5cf6;
    }
    
    /* پادکست‌ها */
    .podcast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .podcast-card {
      background: rgba(255,255,255,0.06);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
    }
    .podcast-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.12);
    }
    .podcast-card .cover {
      background: linear-gradient(45deg, #8b5cf6, #4f46e5);
      height: 120px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 12px;
    }
    .podcast-card h3 {
      font-size: 16px;
      margin-bottom: 5px;
    }
    .podcast-card p {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 12px;
    }
    .podcast-card .btn-start {
      background: #8b5cf6;
      border: none;
      padding: 8px 16px;
      border-radius: 25px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
      width: 100%;
    }
    .podcast-card .btn-start:hover {
      background: #7c3aed;
      transform: scale(1.02);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.6;
    }
    .loading {
      text-align: center;
      padding: 40px;
    }
    #errorMsg {
      background: rgba(239,68,68,0.2);
      color: #fca5a5;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>

<!-- منو -->
<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">✕</button>
  <div class="user-info">
    <div class="avatar">👤</div>
    <div class="email" id="userEmail">---</div>
  </div>
  <a class="menu-item" href="dashboard.html">📊 داشبورد</a>
  <a class="menu-item" href="#" onclick="alert('به زودی')">📜 تاریخچه</a>
  <a class="menu-item" href="#" onclick="alert('به زودی')">⚙️ تنظیمات</a>
  <a class="menu-item logout" onclick="logoutUser()">🚪 خروج</a>
</div>

<!-- محتوا -->
<div class="main">
  <div class="header">
    <h1>📚 داشبورد من</h1>
    <button class="hamburger" onclick="openSidebar()">
      <span></span><span></span><span></span>
    </button>
  </div>
  
  <div id="errorMsg"></div>
  <div id="podcastContainer" class="podcast-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// ===== توابع منو =====
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

// بستن منو با کلیک بیرون
document.addEventListener('click', function(e) {
  const sidebar = document.getElementById('sidebar');
  const hamburger = document.querySelector('.hamburger');
  if (sidebar.classList.contains('open') && 
      !sidebar.contains(e.target) && 
      !hamburger.contains(e.target)) {
    closeSidebar();
  }
});

// ===== تنظیمات Supabase =====
const SUPABASE_URL = "https://rkdjnkkdrhyzxzdlypff.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZGpua2tkcmh5enh6ZGx5cGZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjAxMDksImV4cCI6MjA5NzMzNjEwOX0.vadAJI4DhbAi5Y12gRd-OLVUYjvKa8R69PYvT68niyo";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== توابع کمکی =====
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.style.display = 'block';
  el.innerText = '⚠️ ' + msg;
}
function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

// ===== بررسی کاربر =====
async function checkUser() {
  try {
    const { data, error } = await supabaseClient.auth.getUser();
    if (error || !data.user) {
      window.location.href = 'login.html';
      return null;
    }
    document.getElementById('userEmail').innerText = data.user.email || 'کاربر';
    return data.user;
  } catch(err) {
    showError('خطا: ' + err.message);
    return null;
  }
}

// ===== بارگذاری پادکست‌ها =====
async function loadPodcasts() {
  const container = document.getElementById('podcastContainer');
  container.innerHTML = '<div class="loading">⏳ بارگذاری...</div>';
  
  try {
    const { data, error } = await supabaseClient
      .from('podcasts')
      .select('*');
      
    if(error) {
      showError('خطا: ' + error.message);
      container.innerHTML = '<div class="empty-state">😵 خطا در دریافت</div>';
      return;
    }
    
    if(!data || data.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div style="font-size:50px;">📭</div>
          <p>هیچ پادکستی وجود ندارد</p>
          <p style="font-size:14px;opacity:0.7;">از SQL Editor یک پادکست اضافه کنید</p>
        </div>
      `;
      return;
    }
    
    let html = '';
    data.forEach(pod => {
      html += `
        <div class="podcast-card">
          <div class="cover">🎙</div>
          <h3>${pod.title || 'بدون عنوان'}</h3>
          <p>${pod.description || ''}</p>
          <button class="btn-start" onclick="goToQuiz('${pod.id}')">شرکت در آزمون</button>
        </div>
      `;
    });
    container.innerHTML = html;
    hideError();
    
  } catch(err) {
    showError('خطا: ' + err.message);
    container.innerHTML = '<div class="empty-state">💥 خطای غیرمنتظره</div>';
  }
}

// ===== رفتن به آزمون =====
function goToQuiz(id) {
  if(!id) return;
  window.location.href = 'quiz.html?podcastId=' + id;
}

// ===== خروج =====
async function logoutUser() {
  try {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  } catch(err) {
    showError('خطا در خروج: ' + err.message);
  }
}

// ===== اجرا =====
(async function() {
  const user = await checkUser();
  if(user) {
    await loadPodcasts();
  }
})();
</script>

</body>
</html>
