<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>کارنامه | Podcast Academy</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      color: #fff;
      padding: 30px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 10px;
    }
    .summary {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.06);
      border-radius: 15px;
      margin-bottom: 30px;
    }
    .summary .score {
      font-size: 56px;
      font-weight: bold;
      color: #fbbf24;
    }
    .summary .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    .summary .stats .correct { color: #4ade80; }
    .summary .stats .wrong { color: #f87171; }
    .summary .feedback {
      margin-top: 15px;
      font-size: 20px;
    }
    .question-review {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 18px;
      margin: 12px 0;
      border-right: 4px solid #555;
    }
    .question-review.correct {
      border-right-color: #4ade80;
    }
    .question-review.wrong {
      border-right-color: #f87171;
    }
    .question-review .q-text {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .question-review .answer {
      margin: 4px 0;
      padding: 6px 12px;
      border-radius: 8px;
      display: inline-block;
    }
    .question-review .answer.user-answer {
      background: rgba(255,255,255,0.08);
    }
    .question-review .answer.correct-answer {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }
    .question-review .answer.wrong-answer {
      background: rgba(248, 113, 113, 0.2);
      color: #f87171;
    }
    .question-review .status-icon {
      font-size: 22px;
      margin-left: 10px;
    }
    .btn-back {
      display: block;
      background: #8b5cf6;
      border: none;
      padding: 14px 30px;
      border-radius: 15px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      margin: 30px auto 0;
      transition: 0.3s;
      width: fit-content;
    }
    .btn-back:hover {
      background: #7c3aed;
      transform: scale(1.05);
    }
    .loading {
      text-align: center;
      padding: 40px;
      opacity: 0.7;
    }
    .error-box {
      text-align: center;
      padding: 30px;
      color: #f87171;
      background: rgba(239,68,68,0.1);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 کارنامه آزمون</h1>
    <div id="resultContent">
      <div class="loading">⏳ در حال بارگذاری...</div>
    </div>
    <button class="btn-back" onclick="goDashboard()">🏠 بازگشت به داشبورد</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // =============================================
    // تنظیمات Supabase
    // =============================================
    const SUPABASE_URL = "https://rkdjnkkdrhyzxzdlypff.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZGpua2tkcmh5enh6ZGx5cGZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjAxMDksImV4cCI6MjA5NzMzNjEwOX0.vadAJI4DhbAi5Y12gRd-OLVUYjvKa8R69PYvT68niyo";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =============================================
    // گرفتن پارامترها
    // =============================================
    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        score: parseInt(params.get('score')) || 0,
        total: parseInt(params.get('total')) || 0,
        correct: parseInt(params.get('correct')) || 0,
        podcastId: params.get('podcastId')
      };
    }

    // =============================================
    // بازخورد
    // =============================================
    function getFeedback(score) {
      if (score >= 80) return '🎉 عالی! تسلط کامل داری!';
      if (score >= 60) return '👍 خوب بود، ولی می‌تونی بهتر بشی!';
      if (score >= 40) return '📖 مرور دوباره پادکست توصیه میشه.';
      return '💪 نگران نباش، با تمرین بیشتر حتماً پیشرفت می‌کنی!';
    }

    // =============================================
    // بازگشت به داشبورد
    // =============================================
    function goDashboard() {
      window.location.href = 'dashboard.html';
    }

    // =============================================
    // اصلی
    // =============================================
    async function loadResult() {
      const container = document.getElementById('resultContent');
      const { score, total, correct, podcastId } = getParams();
      const wrong = total - correct;

      // ===== چک کردن podcastId =====
      if (!podcastId) {
        container.innerHTML = '<div class="error-box">❌ شناسه پادکست پیدا نشد!<br><small style="font-size:14px;">لطفاً از صفحه آزمون دوباره امتحان کنید.</small></div>';
        return;
      }

      // ===== ۱. دریافت سوالات =====
      const { data: questions, error: qError } = await supabaseClient
        .from('aql')
        .select('*')
        .eq('podcast_id', podcastId);

      if (qError) {
        container.innerHTML = '<div class="error-box">❌ خطا در دریافت سوالات: ' + qError.message + '</div>';
        return;
      }

      if (!questions || questions.length === 0) {
        container.innerHTML = '<div class="error-box">❌ هیچ سوالی برای این پادکست یافت نشد!</div>';
        return;
      }

      // ===== ۲. دریافت کاربر =====
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) {
        container.innerHTML = '<div class="error-box">❌ لطفاً وارد شوید</div>';
        return;
      }

      // ===== ۳. دریافت پاسخ‌های کاربر =====
      const questionIds = questions.map(function(q) { return q.id; });
      const { data: userAnswers } = await supabaseClient
        .from('answers')
        .select('*')
        .eq('user_id', user.id)
        .in('question_id', questionIds);

      // ساخت مپ پاسخ‌ها
      const answerMap = {};
      (userAnswers || []).forEach(function(a) {
        answerMap[a.question_id] = a;
      });

      // ===== ۴. ساخت HTML =====
      let html = '';
      html += '<div class="summary">';
      html += '  <div class="score">' + score + '%</div>';
      html += '  <div class="stats">';
      html += '    <span class="correct">✅ درست: ' + correct + '</span>';
      html += '    <span class="wrong">❌ غلط: ' + wrong + '</span>';
      html += '    <span>📝 مجموع: ' + total + '</span>';
      html += '  </div>';
      html += '  <div class="feedback">' + getFeedback(score) + '</div>';
      html += '</div>';
      html += '<div style="margin-top:20px;">';
      html += '  <h3 style="margin-bottom:15px;">🔍 بررسی پاسخ‌ها</h3>';

      questions.forEach(function(q, index) {
        const userAns = answerMap[q.id];
        const selected = userAns ? userAns.selected_option : null;
        const isCorrect = userAns ? userAns.is_correct : false;
        const isAnswered = selected !== null && selected !== undefined;

        let statusClass = 'question-review';
        let statusIcon = '⬜';
        let userAnswerHtml = 'پاسخ داده نشده';

        if (isAnswered) {
          if (isCorrect) {
            statusClass += ' correct';
            statusIcon = '✅';
            userAnswerHtml = '<span class="answer user-answer correct-answer">' + selected + '</span>';
          } else {
            statusClass += ' wrong';
            statusIcon = '❌';
            userAnswerHtml = '<span class="answer user-answer wrong-answer">' + selected + '</span> → <span class="answer correct-answer">' + q.correct_answer + '</span>';
          }
        } else {
          statusClass += ' wrong';
          statusIcon = '⚠️';
          userAnswerHtml = '<span class="answer wrong-answer">پاسخ نداده</span> → <span class="answer correct-answer">' + q.correct_answer + '</span>';
        }

        html += '<div class="' + statusClass + '">';
        html += '  <div class="q-text">';
        html += '    <span class="status-icon">' + statusIcon + '</span>';
        html += '    ' + (index + 1) + '. ' + q.question;
        html += '  </div>';
        html += '  <div>پاسخ شما: ' + userAnswerHtml + '</div>';
        html += '</div>';
      });

      html += '</div>';
      container.innerHTML = html;
    }

    // =============================================
    // اجرا
    // =============================================
    loadResult();
  </script>
</body>
</html>
