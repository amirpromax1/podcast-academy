<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>آزمون</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(255,255,255,0.06);
      padding: 30px;
      border-radius: 20px;
      max-width: 700px;
      width: 90%;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    #questionCounter { opacity: 0.7; margin-bottom: 15px; text-align: center; }
    .question-box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .question-box p { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
    .options label {
      display: block;
      padding: 10px 15px;
      margin: 8px 0;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .options label:hover { background: rgba(139,92,246,0.3); }
    .options input[type="radio"] { margin-left: 10px; }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .nav-buttons button {
      background: #8b5cf6;
      border: none;
      padding: 10px 25px;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      flex: 1;
    }
    .nav-buttons button:hover { background: #7c3aed; transform: scale(1.02); }
    .nav-buttons .submit-btn { background: #22c55e; }
    .nav-buttons .submit-btn:hover { background: #16a34a; }
    #errorMsg {
      color: #fca5a5;
      background: rgba(239,68,68,0.15);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 آزمون</h1>
    <div id="errorMsg"></div>
    <div id="questionCounter"></div>
    <div id="questionContainer"></div>
    <div class="nav-buttons">
      <button onclick="prevQuestion()">⬅️ قبلی</button>
      <button onclick="nextQuestion()">بعدی ➡️</button>
      <button class="submit-btn" onclick="submitQuiz()">✅ پایان آزمون</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // =============================================
    // تنظیمات Supabase
    // =============================================
    const SUPABASE_URL = "https://rkdjnkkdrhyzxzdlypff.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZGpua2tkcmh5enh6ZGx5cGZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjAxMDksImV4cCI6MjA5NzMzNjEwOX0.vadAJI4DhbAi5Y12gRd-OLVUYjvKa8R69PYvT68niyo";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =============================================
    // متغیرهای سراسری
    // =============================================
    let currentQuestionIndex = 0;
    let questions = [];
    let answers = {};
    let podcastId = null;

    // =============================================
    // گرفتن آیدی از URL
    // =============================================
    function getPodcastId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('podcastId');
    }

    // =============================================
    // نمایش خطا
    // =============================================
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.style.display = 'block';
      el.innerText = '⚠️ ' + msg;
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    // =============================================
    // بارگذاری سوالات
    // =============================================
    async function loadQuestions() {
      podcastId = getPodcastId();
      console.log('📌 podcastId:', podcastId);

      if (!podcastId) {
        showError('شناسه پادکست پیدا نشد!');
        document.getElementById('questionContainer').innerHTML = '<p style="text-align:center;">❌ خطا: شناسه پادکست نامعتبر</p>';
        return;
      }

      const container = document.getElementById('questionContainer');
      container.innerHTML = '<div style="text-align:center;">⏳ در حال بارگذاری سوالات...</div>';

      try {
        const { data, error } = await supabaseClient
          .from('aql')
          .select('*')
          .eq('podcast_id', podcastId);

        console.log('📦 تعداد سوالات:', data ? data.length : 0);

        if (error) {
          showError('خطا در دریافت سوالات: ' + error.message);
          container.innerHTML = '<p style="text-align:center;">❌ خطا در دریافت سوالات</p>';
          return;
        }

        if (!data || data.length === 0) {
          showError('هیچ سوالی برای این پادکست یافت نشد!');
          container.innerHTML = '<p style="text-align:center;">📭 هیچ سوالی وجود ندارد</p>';
          return;
        }

        questions = data;
        hideError();
        showQuestion(0);

      } catch (err) {
        console.error('🔥 خطای غیرمنتظره:', err);
        showError('خطا: ' + err.message);
        container.innerHTML = '<p style="text-align:center;">💥 خطای غیرمنتظره</p>';
      }
    }

    // =============================================
    // نمایش سوال
    // =============================================
    function showQuestion(index) {
      if (!questions.length) return;
      const q = questions[index];
      document.getElementById('questionCounter').innerText = 'سوال ' + (index + 1) + ' از ' + questions.length;

      let html = '<div class="question-box"><p>' + q.question + '</p><div class="options">';
      const opts = q.options || [];
      opts.forEach(function(opt) {
        const checked = (answers[q.id] === opt) ? 'checked' : '';
        html += '<label><input type="radio" name="q" value="' + opt + '" ' + checked + ' onchange="answers[\'' + q.id + '\']=\'' + opt + '\'"> ' + opt + '</label>';
      });
      html += '</div></div>';
      document.getElementById('questionContainer').innerHTML = html;
    }

    // =============================================
    // قبلی / بعدی
    // =============================================
    function nextQuestion() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        showQuestion(currentQuestionIndex);
      }
    }

    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        showQuestion(currentQuestionIndex);
      }
    }

    // =============================================
    // پایان آزمون
    // =============================================
    async function submitQuiz() {
      const unanswered = questions.filter(function(q) {
        return !answers[q.id];
      });

      if (unanswered.length > 0) {
        if (!confirm('⚠️ هنوز به ' + unanswered.length + ' سوال پاسخ ندادی! ادامه می‌دی؟')) {
          return;
        }
      }

      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) {
        alert('❌ لطفاً وارد شوید');
        return;
      }

      let correct = 0;
      for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const selected = answers[q.id] || null;
        const isCorrect = (selected === q.correct_answer);
        if (isCorrect) correct++;

        await supabaseClient.from('answers').insert({
          user_id: user.id,
          question_id: q.id,
          selected_option: selected,
          is_correct: isCorrect
        });
      }

      const score = Math.round((correct / questions.length) * 100);
      
      // ===== مهم: ارسال podcastId به کارنامه =====
      window.location.href = 'result.html?score=' + score + '&total=' + questions.length + '&correct=' + correct + '&podcastId=' + podcastId;
    }

    // =============================================
    // اجرا
    // =============================================
    loadQuestions();
  </script>
</body>
</html>
